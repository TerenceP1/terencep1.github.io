<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- <script>
            var Module = {
                onRuntimeInitialized: () => run()
            };
            
        </script> -->
        <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
        <style>
            html{
                font-family:'Courier New', Courier, monospace;
            }
            canvas{
                border: black solid 5px;
            }
        </style>
        
        <!-- <script src="mandelbrot.js" defer></script> -->
        <title>Mandelbrot set WASM explorer | Terence's random HTML projects</title>

    </head>
    <body>
        <div id="loading">
            <h1 id="loadh1">Loading</h1>
            <h2 id="loadStat">Load status: 0% done</h2>
        </div>
        <div id="main" hidden>
            <h1>Welcome to my Mandelbrot set interactive zoomer</h1>
            <h2>Built with Emscripten</h2>
            <h2>This is a early release so it might be buggy and I have not added certain features yet (fun sneak peak)</h2>
            <canvas id="cnv" width="400" height="400"></canvas>
            <br>
            <p><b>STATUS: </b><span id="status">Idle</span></p>
            <p id="loc">Re: 0<br>Im:0<br>Zoom:0</p>
            <textarea id="dbg"></textarea><button onclick="alert(eval(getE('dbg').value));">RUN THE CODE (debug thing and a placeholder don't touch if you don't know)</button>
        </div>
        <script>
            Decimal.set({ precision: 34 });
            Decimal.precision=34;
            let makeRowDouble2;
            let makeRowFloat;
            let makeRowDouble;
            let palette;
            let inits=0;
            let initsTtl=17;
            let getE=(...a)=>document.getElementById(...a);
            let cnv=getE("cnv");
            let ctx=cnv.getContext("2d");
            ctx.imageSmoothingEnabled=false;
            // loader
            let ld_st=0;
            let ldtm=setInterval(()=>{
                ld_st=(ld_st+1)%4;
                getE("loadh1").innerText="Loading"+["",".","..","..."][ld_st];
            },400);
            // function run(){
            //     const makeRowDouble2 = Module.cwrap('makeRowDouble2', null, [
            //         "number", "number", "number", "number", "number", "number", "number", "number", "number", "number", "number",
            //     ]);
            //     const makeRowFloat = Module.cwrap('makeRowFloat', null, [
            //         "number", "number", "number", "number", "number", "number", "number", "number",
            //     ]);
            //     const makeRowDouble = Module.cwrap('makeRowDouble', null, [
            //         "number", "number", "number", "number", "number", "number", "number", "number",
            //     ]);
            //     inits++;
            //     updStat();
            //     if (inits>=initsTtl){
            //         generateImage();
            //     }
            // }
            let workers=[];
            let firstTime=true;
            // each worker has a MAth.random job id and if id changes it will silence itself
            let rowsLeft=[];
            let width=400;height=400;
            let img= new ImageData(width, height);
            let batchId;
            let re=new Decimal(0),im=new Decimal(0),zoom=1;
            let maxitr=1000,speclen=100;
            function nextRow(batch,thid){
                if (batchId==batch){
                    if (rowsLeft.length>0){
                        let thRow=rowsLeft.pop();
                        getE("status").innerText = `Working (${zoom < 1e13?"normal precision":"double-double precision"})... ${height-rowsLeft.length} rows out of ${height} done`;
                        workers[thid].postMessage({
                            type: 3,
                            re: re.toString(),
                            im: im.toString(),
                            zoom: zoom,
                            speclen:speclen,
                            maxitr:maxitr,
                            row:thRow,
                            height:height,
                            id:batch
                        });
                        
                    }
                    else{
                        getE("status").innerText="Idle";
                    }
                }
            }
            let startT2;
            function makeWorkers(){
            for (let i=0;i<16;i++){
                // new worker
                let cWorker=new Worker("worker.js");
                let tsid=i;
                cWorker.addEventListener("message",function(msg){
                    let dat=msg.data;
                    //console.log(dat,tsid);
                    if (dat.type==0){
                        //console.log(`Loading took ${performance.now()-startT2}ms`)
                        inits++;
                        cWorker.postMessage({
                            type:4,
                            plt:palette
                        })
                        updStat();
                        if (inits >= initsTtl) {
                            generateImage();
                        }
                    }
                    else if (dat.type==1){
                        if (batchId == dat.id) {
                            //console.log(`Worker number ${tsid} took ${performance.now()-dat.ts}ms`)
                            for (let i=0;i<width;i++){
                                img.data[dat.row2 * width * 4 + i * 4] = dat.row[3 * i + 2];
                                img.data[dat.row2 * width * 4 + i * 4 + 1] = dat.row[3 * i + 1];
                                img.data[dat.row2 * width * 4 + i * 4 + 2] = dat.row[3 * i];
                                img.data[dat.row2 * width * 4 + i * 4 + 3] = 255;
                            }
                            ctx.putImageData(img,0,0);
                            nextRow(dat.id,tsid);
                        }
                    }
                });
                cWorker.postMessage({id:i,type:0});
                workers.push(cWorker);
            }
        }
            // load default pelette
            (async function(){
                palette=new Uint8Array(await (await fetch("palettes/neon-p.dat")).arrayBuffer()) ;
                //startT2=performance.now();
                makeWorkers();
                inits++;
                updStat();
                if (inits >= initsTtl) {
                    generateImage();
                }
            })();
            function reverseBits(n, bits) { // a helper made by chatgpt
                    let result = 0;

                    for (let i = 0; i < bits; i++) {
                        if (n & (1 << i)) {
                            result |= 1 << (bits - 1 - i);
                        }
                    }

                    return result;
                }
                function roundUpToPowerOfTwo(n) { // CHATGPT TOO
                        if (n <= 1) return 1;

                        // If already power of 2, return it
                        if ((n & (n - 1)) === 0) return n;

                        let power = 1;
                        while (power < n) {
                            power <<= 1; // multiply by 2
                        }

                        return power;
                    }
            function generateImage(){
                console.log("IMAGE");
                getE("status").innerText = `Working (${zoom < 1e13 ? "normal precision" : "double-double precision"})... 0 rows out of ${height} done`;
                if (firstTime){
                    firstTime=false;
                    getE("main").hidden=false;
                    getE("loading").hidden=true;
                }
                img= new ImageData(width,height);
                batchId=Math.random();
                rowsLeft.length = 0;
                for (let i=0;i<roundUpToPowerOfTwo(height);i++){
                    let num= reverseBits(i,Math.floor(Math.log2(height))+1);
                    if (num<height){

                rowsLeft.push(num);}
                }
                for (let i=0;i<16;i++){
                    nextRow(batchId,i);
                }
            }
            cnv.addEventListener("click", (e) => {
                    const rect = cnv.getBoundingClientRect();
                let aspect=Math.min(width,height);
                    const x = e.clientX - rect.left-width/2;
                    const y = e.clientY - rect.top-height/2;
                re=re.add(x * 4 / zoom / aspect);
                im=im.add(-y * 4 / zoom / aspect);
                zoom*=1.5;
                getE("loc").innerText=`Re: ${re.toPrecision(34)}\nIm: ${im.toPrecision(34)}\nZoom: ${zoom}`;
generateImage();
                    console.log("Canvas coords:", x, y);
                });
            function updStat(){
                getE('loadStat').innerText="Load Status: "+(Math.round(inits/initsTtl*100)).toString()+"% done"
            }
        </script>
    </body>
</html>
